<div class="message-container" [class.own]="isOwnMessage">
  <div class="message-wrapper" style="display: flex; width: 100%">
    <div class="poll-card">
      <div class="poll-title">
        {{ content }}
      </div>

      <div class="poll-reason">
        {{ reason }}
      </div>

      <div class="poll-description">
        {{ description }}
      </div>

      <div class="poll-options">
        <div
          class="poll-option"
          *ngFor="let option of options"
          [class.selected]="option.selected"
          (click)="toggleOption(option)"
        >
          <div class="checkbox">
            <span *ngIf="option.selected">✓</span>
          </div>
          <span class="label">{{ option.label }}</span>
        </div>
      </div>

      <!-- Vote Progress Bar -->
      <div class="vote-progress-container" *ngIf="options.length > 0">
        <div class="progress-bar-wrapper">
          <div
            class="progress-yes"
            [style.width.%]="getVotePercentages().yesPercent"
          ></div>
          <div
            class="progress-no"
            [style.width.%]="getVotePercentages().noPercent"
          ></div>
        </div>
        <div class="vote-stats">
          <span class="yes-count"
            >Yes: {{ getVotePercentages().yesCount }}</span
          >
          <span class="no-count">No: {{ getVotePercentages().noCount }}</span>
        </div>
      </div>

      <div class="poll-consequence">
        {{ consequence }}
      </div>

      <div *ngIf="groupedReactions.length > 0" class="reactions-container">
        <span
          class="message-attached-reaction"
          *ngFor="let reaction of groupedReactions"
        >
          {{ reaction.emoji
          }}<span *ngIf="reaction.count > 1">{{ reaction.count }}</span>
        </span>
      </div>
    </div>

    <div class="message-content">
      <button class="btn no-bg-btn rounded">
        <svg
          fill="#333"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 640 640"
        >
          <path
            d="M268.2 82.4C280.2 87.4 288 99 288 112L288 192L400 192C497.2 192 576 270.8 576 368C576 481.3 494.5 531.9 475.8 542.1C473.3 543.5 470.5 544 467.7 544C456.8 544 448 535.1 448 524.3C448 516.8 452.3 509.9 457.8 504.8C467.2 496 480 478.4 480 448.1C480 395.1 437 352.1 384 352.1L288 352.1L288 432.1C288 445 280.2 456.7 268.2 461.7C256.2 466.7 242.5 463.9 233.3 454.8L73.3 294.8C60.8 282.3 60.8 262 73.3 249.5L233.3 89.5C242.5 80.3 256.2 77.6 268.2 82.6z"
          />
        </svg>
      </button>
      <div class="reaction-wrapper">
        <button
          class="reaction-btn btn no-bg-btn rounded"
          (click)="toggleReactions()"
        >
          <svg
            fill="#333"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 640 640"
          >
            <path
              d="M528 320C528 205.1 434.9 112 320 112C205.1 112 112 205.1 112 320C112 434.9 205.1 528 320 528C434.9 528 528 434.9 528 320zM64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576C178.6 576 64 461.4 64 320zM241.3 383.4C256.3 399 282.4 416 320 416C357.6 416 383.7 399 398.7 383.4C407.9 373.8 423.1 373.5 432.6 382.7C442.1 391.9 442.5 407.1 433.3 416.6C411.2 439.6 373.3 464 320 464C266.7 464 228.8 439.6 206.7 416.6C197.5 407 197.8 391.8 207.4 382.7C217 373.6 232.2 373.8 241.3 383.4zM208 272C208 254.3 222.3 240 240 240C257.7 240 272 254.3 272 272C272 289.7 257.7 304 240 304C222.3 304 208 289.7 208 272zM400 240C417.7 240 432 254.3 432 272C432 289.7 417.7 304 400 304C382.3 304 368 289.7 368 272C368 254.3 382.3 240 400 240z"
            />
          </svg>
        </button>
        <div class="reaction-popup" *ngIf="showReactions">
          <button
            *ngFor="let r of reactionsMap"
            class="reaction-option"
            [title]="r.label"
            (click)="addReaction(r)"
          >
            {{ r.emoji }}
          </button>
          <button
            class="reaction-menu-btn btn no-bg-btn rounded"
            (click)="toggleReactionMenu()"
            title="Change emoji"
          >
            <svg
              fill="#333"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 200 800"
              style="width: 20px; height: 20px"
            >
              <circle cx="100" cy="200" r="64" fill="#333" />
              <circle cx="100" cy="400" r="64" fill="#333" />
              <circle cx="100" cy="600" r="64" fill="#333" />
            </svg>
          </button>
        </div>
        <div class="reaction-menu-dropdown" *ngIf="showReactionMenu">
          <button
            *ngFor="let emoji of allEmojis"
            class="emoji-option"
            [title]="emoji.label"
            (click)="changeReaction(emoji)"
          >
            {{ emoji.emoji }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="message-info">
    <p class="timestamp">{{ formatDate(createdAt) }}</p>
    <svg
      *ngIf="status === MessageTransmissionStatus.TAKE_OFF"
      class="status-icon"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 640 640"
    >
      <path
        d="M528 320C528 434.9 434.9 528 320 528C205.1 528 112 434.9 112 320C112 205.1 205.1 112 320 112C434.9 112 528 205.1 528 320zM64 320C64 461.4 178.6 576 320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320zM296 184L296 320C296 328 300 335.5 306.7 340L402.7 404C413.7 411.4 428.6 408.4 436 397.3C443.4 386.2 440.4 371.4 429.3 364L344 307.2L344 184C344 170.7 333.3 160 320 160C306.7 160 296 170.7 296 184z"
      />
    </svg>
    <svg
      *ngIf="status === MessageTransmissionStatus.SENT"
      class="status-icon"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 640 640"
    >
      <path
        d="M530.8 134.1C545.1 144.5 548.3 164.5 537.9 178.8L281.9 530.8C276.4 538.4 267.9 543.1 258.5 543.9C249.1 544.7 240 541.2 233.4 534.6L105.4 406.6C92.9 394.1 92.9 373.8 105.4 361.3C117.9 348.8 138.2 348.8 150.7 361.3L252.2 462.8L486.2 141.1C496.6 126.8 516.6 123.6 530.9 134z"
      />
    </svg>
    <svg
      *ngIf="status === MessageTransmissionStatus.DELIVERED"
      class="status-icon"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 640 640"
    >
      <path
        d="M377.9 130.8C388.3 116.5 385.1 96.5 370.8 86.1C356.5 75.7 336.5 78.9 326.1 93.2L220.1 238.9L182.6 201.4C170.1 188.9 149.8 188.9 137.3 201.4C124.8 213.9 124.8 234.2 137.3 246.7L201.3 310.7C207.9 317.3 217.1 320.7 226.4 320C235.7 319.3 244.3 314.5 249.8 306.9L377.8 130.9zM505.9 266.8C516.3 252.5 513.1 232.5 498.8 222.1C484.5 211.7 464.5 214.9 454.1 229.2L284.1 462.9L214.6 393.4C202.1 380.9 181.8 380.9 169.3 393.4C156.8 405.9 156.8 426.2 169.3 438.7L265.3 534.7C271.9 541.3 281.1 544.7 290.4 544C299.7 543.3 308.3 538.5 313.8 530.9L505.8 266.9z"
      />
    </svg>
    <svg
      *ngIf="status === MessageTransmissionStatus.SEEN"
      class="status-icon"
      style="fill: rgb(0, 132, 255)"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 640 640"
    >
      <path
        d="M377.9 130.8C388.3 116.5 385.1 96.5 370.8 86.1C356.5 75.7 336.5 78.9 326.1 93.2L220.1 238.9L182.6 201.4C170.1 188.9 149.8 188.9 137.3 201.4C124.8 213.9 124.8 234.2 137.3 246.7L201.3 310.7C207.9 317.3 217.1 320.7 226.4 320C235.7 319.3 244.3 314.5 249.8 306.9L377.8 130.9zM505.9 266.8C516.3 252.5 513.1 232.5 498.8 222.1C484.5 211.7 464.5 214.9 454.1 229.2L284.1 462.9L214.6 393.4C202.1 380.9 181.8 380.9 169.3 393.4C156.8 405.9 156.8 426.2 169.3 438.7L265.3 534.7C271.9 541.3 281.1 544.7 290.4 544C299.7 543.3 308.3 538.5 313.8 530.9L505.8 266.9z"
      />
    </svg>
  </div>
</div>
