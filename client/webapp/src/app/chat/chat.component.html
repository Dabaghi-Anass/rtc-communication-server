<link
  href="https://fonts.googleapis.com/icon?family=Material+Icons"
  rel="stylesheet"
/>

<div class="chat-container">
  <div *ngFor="let date of dates" class="day-group">
    <div>
      <span class="date-header">{{ date }}</span>
    </div>
    <div *ngFor="let senderGroup of senderGroupsFor(date)" class="sender-group">
      <ul class="messages-list">
        <li
          class="message-box"
          *ngFor="
            let message of senderGroup.messages;
            let i = index;
            let isFirst = first;
            let isLast = last
          "
          [ngClass]="{
            'single-emoji': isSingleEmoji(message.content),
            'poll-message': message.type === 'poll',
            decorated: message.isDecorated,
          }"
          [attr.data-message-id]="getMessageId(message, i, date)"
          (click)="
            message.isDecorated && toggleOverlay(getMessageId(message, i, date))
          "
        >
          <app-message
            *ngIf="message.type === 'text'"
            [content]="message.content"
            [sender]="message.sender"
            [isOwnMessage]="message.isOwnMessage"
            [createdAt]="message.createdAt"
            [singleEmoji]="isSingleEmoji(message.content)"
            [status]="message.status"
            [reactions]="message.reactions || []"
          />

          <app-poll-message
            *ngIf="message.type === 'poll'"
            [content]="message.content"
            [reason]="message.reason"
            [description]="message.description"
            [options]="message.options"
            [consequence]="message.consequence"
            [sender]="message.sender"
            [isOwnMessage]="message.isOwnMessage"
            [createdAt]="message.createdAt"
            [status]="message.status"
            class="poll-container"
          />

          <div
            *ngIf="message.type === 'audio'"
            class="audio-message"
            [ngClass]="{ 'own-audio': message.isOwnMessage }"
          >
            <div class="audio-player">
              <button class="play-btn" (click)="toggleAudioPlayback($event)">
                <span class="material-icons">play_arrow</span>
              </button>
              <div class="waveform-container">
                <canvas
                  class="frequency-visualizer"
                  [attr.data-audio-id]="getMessageId(message, i, date)"
                ></canvas>
                <span class="time">{{ message.duration }}s</span>
              </div>
            </div>
            <audio [src]="message.content" hidden></audio>
          </div>
        </li>
      </ul>
    </div>
  </div>
</div>

<div class="message-input-container">
  <div class="input-wrapper">
    <div class="recording-indicator" *ngIf="isRecording">
      <span class="recording-dot"></span>
      <span class="recording-text">{{ recordingTime }}s</span>
    </div>
    <input
      type="text"
      class="message-input"
      [(ngModel)]="messageInput"
      (keyup.enter)="sendMessage()"
      placeholder="Message..."
      [disabled]="isRecording"
    />
    <button
      class="icon-btn send-btn"
      (click)="sendMessage()"
      [disabled]="!messageInput.trim() || isRecording"
      title="Send message"
    >
      <span class="material-icons">send</span>
    </button>
    <button
      class="icon-btn audio-btn"
      (click)="toggleAudioRecording()"
      [class.recording]="isRecording"
      title="Record audio"
    >
      <span class="material-icons">{{
        isRecording ? "stop_circle" : "mic"
      }}</span>
    </button>
  </div>
</div>
